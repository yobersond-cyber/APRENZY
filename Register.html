<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTER</title>
    <link rel="stylesheet" href="CSS/style_register.css">
</head>
<body>

    <img src="img/logo footer.png" alt="logo">
    
    <div class="login">

        <h1>APRENZY</h1>
        <p>Bienvenido</p>
        <p> Es un gusto conocerte el dia de hoy vamos a verificar unos datos <br>
            para un buen registro en nuestro aplicativo
        </p>

        <form>
            
            <input type="text" placeholder="Nombres completos" required>

            <input type="text" placeholder="Apellidos" required>

            <input type="number" placeholder="Edad" required>

        <div class="fecha">
            <label for="fecha">Fecha de nacimiento</label>
            <input type="date" id="fecha" required>
        </div>

            <input type="email" placeholder="Correo electrónico" required>

            <input type="password" placeholder="Contraseña" required>

            
            <button type="submit">Registrar</button>
        </form>

        <a href="iniciar_sesion.html">¿Ya tienes una cuenta?</a> 

    </div>
</body>
</html>
